name: Flow Requirements Gate (BMS)

on:
  workflow_dispatch: # disabled — replaced by agent.yml on main

permissions:
  contents: read
  pull-requests: write

jobs:
  flow-requirements-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed to diff against base

      - name: Collect PR diff
        id: diff
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin "${{ github.base_ref }}" --depth=1
          DIFF="$(git diff --unified=3 "origin/${{ github.base_ref }}"...HEAD)"
          # Avoid blowing up logs; still send enough context for a demo
          MAX_CHARS=60000
          if [ "${#DIFF}" -gt "$MAX_CHARS" ]; then
            DIFF="${DIFF:0:$MAX_CHARS}\n\n[TRUNCATED: diff exceeded ${MAX_CHARS} chars]"
          fi
          # Multiline output (unique delimiter so diff content cannot break heredoc)
          {
            echo "diff<<FLOW_DIFF_END_7f3a"
            printf '%s' "$DIFF"
            echo ""
            echo "FLOW_DIFF_END_7f3a"
          } >> "$GITHUB_OUTPUT"

      - name: Call Flow AI requirements check
        id: flow
        env:
          FLOW_TOKEN: ${{ secrets.FLOW_TOKEN }}
          FLOW_URL: ${{ vars.FLOW_URL || 'https://backend.branch.flowengineering.com' }}
          FLOW_CUSTOMER: ${{ vars.FLOW_CUSTOMER || 'demo' }}
          DIFF: ${{ steps.diff.outputs.diff }}
        shell: bash
        run: |
          set -euo pipefail

          # POST /ai/review with body { "prompt": "<full prompt>" }
          INSTRUCTIONS="You are an automated CI gate running non-interactively. There is no human in the loop — you must make a definitive pass/fail decision in a single pass. Do not ask clarifying questions or defer judgement.

          You have access to tools that can query the Flow database (systems, requirements, etc.). You MUST use these tools to look up the relevant BMS/EV battery requirements before making your decision. Start by fetching the root entities for the relevant requirement categories, then drill into specific requirements that relate to the areas of code being changed.

          Task: Evaluate the code change below against the BMS and EV battery requirements stored in Flow. Act as a strict requirements gate for this Electric Vehicle Battery Management System (BMS) codebase.

          You must respond with ONLY valid JSON in this exact schema (no extra text outside the JSON):
          {\"grade\": \"pass\" | \"fail\", \"comment\": \"your explanation here (markdown is encouraged)\"}

          The comment field supports GitHub-flavored markdown. Use it freely for readability — bullet lists, inline code, code blocks, bold/italic, tables, etc.

          When the grade is \"fail\", the comment MUST start with a markdown headline in this format:
          # \u26a0\ufe0f Conflict Alert: <name of the conflicted requirement>
          Then follow with the detailed explanation.

          Rules:
          - grade: \"fail\" if the change violates any BMS or battery safety/functional requirement; \"pass\" otherwise.
          - Consider: SOC/SOH correctness, protection limits (voltage, current, temperature), cell balancing, thermal management, fault handling, and any requirements you find in Flow.
          - comment: Cite the specific requirement(s) violated and reference files/lines where possible. Reference requirements by their name or ID from Flow.
          - If uncertain whether a requirement is violated, grade \"fail\" and explain what evidence is missing.
          - Always query Flow for the actual requirements — do not guess or assume what the requirements say."

          QUERY="Evaluate the following pull request diff against the BMS and EV battery requirements. Identify violations and decide pass/fail."
          REPO="${{ github.repository }}"
          PR_REF="${{ github.head_ref || github.ref_name }}"

          FULL_PROMPT="${INSTRUCTIONS}

          ${QUERY}

          Repository: ${REPO}
          PR/ref: ${PR_REF}

          --- PR DIFF ---
          ${DIFF}"

          BODY="$(printf '%s' "$FULL_PROMPT" | jq -Rs '{ prompt: . }')"
          ENDPOINT="${FLOW_URL%/}/ai/review"

          echo "Requesting: $ENDPOINT"
          RESP="$(curl -sS --max-time 60 -X POST "$ENDPOINT" \
            -H "X-API-Key: ${FLOW_TOKEN}" \
            -H "Content-Type: application/json" \
            -H "Customer: ${FLOW_CUSTOMER}" \
            -d "$BODY")"

          # API returns { "response": "{\"grade\":\"...\", \"comment\":\"...\"}" } — parse nested JSON
          INNER="$(echo "$RESP" | jq -r '.response // empty')"
          if [ -z "$INNER" ]; then INNER="$RESP"; fi
          GRADE="$(echo "$INNER" | jq -r '.grade // empty')"
          COMMENT="$(echo "$INNER" | jq -r '.comment // empty')"

          if [ -z "$GRADE" ] || [ -z "$COMMENT" ]; then
            echo "Flow response did not include required fields: grade/comment"
            echo "Raw response: $RESP"
            exit 2
          fi

          echo "grade=$GRADE" >> "$GITHUB_OUTPUT"
          # Multiline comment (unique delimiter so comment text cannot break heredoc)
          {
            echo "comment<<FLOW_COMMENT_END_7f3a"
            printf '%s' "$COMMENT"
            echo ""
            echo "FLOW_COMMENT_END_7f3a"
          } >> "$GITHUB_OUTPUT"

      - name: Comment on PR with Flow result
        if: always()
        uses: actions/github-script@v7
        env:
          FLOW_GRADE: ${{ steps.flow.outputs.grade }}
          FLOW_COMMENT: ${{ steps.flow.outputs.comment }}
        with:
          script: |
            const grade = (process.env.FLOW_GRADE || "unknown").trim();
            const comment = (process.env.FLOW_COMMENT || "No comment returned.").trim();
            const body = '## Flow Requirements Gate (BMS): **' + grade.toUpperCase() + '**\n\n' + comment + '\n\n_(Automated check from Flow AI)_';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Fail check if grade is not pass
        if: ${{ steps.flow.outputs.grade != 'pass' }}
        run: |
          echo "Flow Requirements Gate failed: ${{ steps.flow.outputs.grade }}"
          exit 1

name: Flow Agent Gate (BMS)

on:
  pull_request:
    branches: [main, agent_test]
    types: [opened, synchronize, reopened, ready_for_review, edited]

permissions:
  contents: read
  pull-requests: write

jobs:
  flow-agent-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed to diff against base

      - name: Resolve Flow environment
        id: env
        shell: bash
        run: |
          if [ "${{ github.base_ref }}" = "main" ]; then
            echo "flow_url=https://backend.branch.flowengineering.com" >> "$GITHUB_OUTPUT"
            echo "flow_app_url=https://branch.flowengineering.com" >> "$GITHUB_OUTPUT"
          else
            echo "flow_url=https://backend.branch-staging.flowengineering.com" >> "$GITHUB_OUTPUT"
            echo "flow_app_url=https://branch-staging.flowengineering.com" >> "$GITHUB_OUTPUT"
          fi

      - name: Collect PR diff
        id: diff
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin "${{ github.base_ref }}" --depth=1
          DIFF="$(git diff --unified=3 "origin/${{ github.base_ref }}"...HEAD)"
          # Avoid blowing up logs; still send enough context for a demo
          MAX_CHARS=60000
          if [ "${#DIFF}" -gt "$MAX_CHARS" ]; then
            DIFF="${DIFF:0:$MAX_CHARS}\n\n[TRUNCATED: diff exceeded ${MAX_CHARS} chars]"
          fi
          # Multiline output (unique delimiter so diff content cannot break heredoc)
          {
            echo "diff<<FLOW_DIFF_END_7f3a"
            printf '%s' "$DIFF"
            echo ""
            echo "FLOW_DIFF_END_7f3a"
          } >> "$GITHUB_OUTPUT"

      - name: Trigger Flow automation
        id: flow
        env:
          FLOW_TOKEN: ${{ secrets.FLOW_TOKEN }}
          FLOW_URL: ${{ vars.FLOW_URL || steps.env.outputs.flow_url }}
          FLOW_APP_URL: ${{ vars.FLOW_APP_URL || steps.env.outputs.flow_app_url }}
          FLOW_CUSTOMER: ${{ vars.FLOW_CUSTOMER || 'demo' }}
          DIFF: ${{ steps.diff.outputs.diff }}
        shell: bash
        run: |
          set -euo pipefail

          BODY="$(jq -n \
            --arg repo "${{ github.repository }}" \
            --argjson pr_number "${{ github.event.pull_request.number }}" \
            --arg title "${{ github.event.pull_request.title }}" \
            --arg action "${{ github.event.action }}" \
            --arg diff "$DIFF" \
            --arg body "${{ github.event.pull_request.body }}" \
            --arg head_branch "${{ github.head_ref }}" \
            --arg base_branch "${{ github.base_ref }}" \
            '{repo: $repo, pr_number: $pr_number, title: $title, action: $action, diff: $diff, body: $body, head_branch: $head_branch, base_branch: $base_branch}')"

          ENDPOINT="${FLOW_URL%/}/ai/trigger/github"
          echo "Requesting: $ENDPOINT"

          RESP="$(curl -sS --max-time 300 -X POST "$ENDPOINT" \
            -H "X-API-Key: ${FLOW_TOKEN}" \
            -H "Content-Type: application/json" \
            -H "Customer: ${FLOW_CUSTOMER}" \
            -d "$BODY")"

          # Extract first result from { results: [...] }
          FIRST="$(echo "$RESP" | jq '.results[0] // empty')"
          if [ -z "$FIRST" ] || [ "$FIRST" = "null" ]; then
            echo "No matching automations found or empty response"
            echo "Raw response: $RESP"
            exit 2
          fi

          AGENT_ID="$(echo "$FIRST" | jq -r '.agent_id // empty')"
          RAW_RESPONSE="$(echo "$FIRST" | jq -r '.integration_response // empty')"
          if [ -z "$RAW_RESPONSE" ]; then
            echo "Flow response did not include an 'integration_response' field"
            echo "Raw response: $RESP"
            exit 2
          fi

          # Parse the integration response as JSON for grade/comment
          GRADE="$(echo "$RAW_RESPONSE" | jq -r '.grade // empty' 2>/dev/null || true)"
          COMMENT="$(echo "$RAW_RESPONSE" | jq -r '.comment // empty' 2>/dev/null || true)"

          if [ -z "$GRADE" ]; then
            GRADE="unknown"
          fi
          if [ -z "$COMMENT" ]; then
            COMMENT="$RAW_RESPONSE"
          fi

          # Extract branches created by the agent
          BRANCHES="$(echo "$FIRST" | jq -r '.branches // [] | .[] | "- [\(.name)]('"${FLOW_APP_URL}/${FLOW_CUSTOMER}"'/\(.id)/table)"')"

          echo "agent_id=$AGENT_ID" >> "$GITHUB_OUTPUT"
          echo "grade=$GRADE" >> "$GITHUB_OUTPUT"
          {
            echo "comment<<FLOW_COMMENT_END_7f3a"
            printf '%s' "$COMMENT"
            echo ""
            echo "FLOW_COMMENT_END_7f3a"
          } >> "$GITHUB_OUTPUT"
          {
            echo "branches<<FLOW_BRANCHES_END_7f3a"
            printf '%s' "$BRANCHES"
            echo ""
            echo "FLOW_BRANCHES_END_7f3a"
          } >> "$GITHUB_OUTPUT"

      - name: Comment on PR with Flow result
        if: always()
        uses: actions/github-script@v7
        env:
          FLOW_GRADE: ${{ steps.flow.outputs.grade }}
          FLOW_COMMENT: ${{ steps.flow.outputs.comment }}
          FLOW_BRANCHES: ${{ steps.flow.outputs.branches }}
          FLOW_APP_URL: ${{ vars.FLOW_APP_URL || steps.env.outputs.flow_app_url }}
        with:
          script: |
            const grade = (process.env.FLOW_GRADE || "unknown").trim();
            const comment = (process.env.FLOW_COMMENT || "No comment returned.").trim();
            const branches = (process.env.FLOW_BRANCHES || "").trim();
            const appUrl = process.env.FLOW_APP_URL;
            const branchesSection = branches ? '\n\n### Flow Branches\n\n' + branches : '';
            const body = '## Flow Agent Gate (BMS): **' + grade.toUpperCase() + '**\n\n' + comment + branchesSection + '\n\n_(Automated check from Flow AI Agent)_';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Fail check if grade is not pass
        if: ${{ steps.flow.outputs.grade != 'pass' }}
        run: |
          echo "Flow Agent Gate failed: ${{ steps.flow.outputs.grade }}"
          exit 1
